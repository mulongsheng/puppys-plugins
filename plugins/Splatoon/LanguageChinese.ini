When the game tells you that ability A has distance D,\nin fact it means that you are allowed to execute\nability A if distance between edge of your hitbox\nand enemy's hitbox is less or equal than distance D,\nthat is for targeted abilities.\nIf an ability is AoE, such check is performed between\nmiddle point of your character and edge of enemy's hitbox.\n\nSummary: if you are trying to make targeted ability indicator -\nenable both "+your hitbox" and "+target hitbox".\nIf you are trying to make AoE ability indicator - \nenable only "+target hitbox" to make indicators valid.==当游戏告诉你技能A有距离D时，\n实际上这意味着如果你的hitbox边缘和敌人的hitbox之间的距离小于或等于距离D，\n那么你可以执行技能A，\n这是针对单体目标技能的。\n如果一个技能是AoE，则在您角色的hitbox和敌人的hitbox边缘之间执行该检查。\n\n总结：如果您正尝试制作单目标技能绘制，请同时启用“+你的hitbox”和“+目标hitbox“。\n如果您试图使AoE技能绘制-\n请仅启用“+目标hitbox”使绘制有效。
